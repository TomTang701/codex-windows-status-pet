name: Windows Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt
      - name: Run formal release candidate checks
        run: python scripts/run_release_candidate_checks.py
      - name: Upload package smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-windows-status-pet-smoke
          path: .build/codex-windows-status-pet-smoke.zip
