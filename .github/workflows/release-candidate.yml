name: Windows Release Candidate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-candidate:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install runtime and release-build dependencies
        run: python -m pip install -r requirements.txt
      - name: Run strict Release Candidate gates
        run: python scripts/run_release_candidate_checks.py
      - name: Download the released v0.9.1 upgrade baseline
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release download v0.9.1 --repo $env:GITHUB_REPOSITORY
          --pattern CodexStatusPet-v0.9.1-win11-x64.zip
          --pattern CodexStatusPet-v0.9.1-win11-x64.zip.sha256
          --dir .build/previous-release
      - name: Run installed product lifecycle smoke
        run: >
          python scripts/installed_lifecycle_smoke.py
          --previous-artifact .build/previous-release/CodexStatusPet-v0.9.1-win11-x64.zip
      - name: Upload approved candidate artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: codex-windows-status-pet-release-candidate
          path: |
            .build/release/CodexStatusPet-v1.0.1-win11-x64.zip
            .build/release/CodexStatusPet-v1.0.1-win11-x64.zip.sha256
