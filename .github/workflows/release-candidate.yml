name: Windows release candidate gates

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release-candidate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python scripts/run_release_candidate_checks.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codex-windows-status-pet-release-candidate
          path: |
            .build/codex-windows-status-pet-smoke.zip
            .build/codex-windows-status-pet-smoke.zip.sha256
