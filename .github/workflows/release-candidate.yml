name: Windows Release Candidate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-candidate:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt
      - name: Run strict Release Candidate gates
        run: python scripts/run_release_candidate_checks.py
      - name: Upload approved candidate artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: codex-windows-status-pet-release-candidate
          path: .build/codex-windows-status-pet-smoke.zip
